<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Place Details</title>
    <script>
      const savedTheme = localStorage.getItem("theme-preference");
      if (savedTheme) {
        document.documentElement.setAttribute("data-theme", savedTheme);
      }
    </script>
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header>
      <nav>
        <a href="index.html">
          <img src="assets/logo.png" alt="HBnB Logo" class="logo" />
        </a>
        <div class="nav-actions">
          <a href="login.html" id="login-link" class="login-button">Login</a>
          <!-- Theme toggle switch -->
          <button
            class="theme-toggle"
            id="theme-toggle"
            title="Toggles light & dark"
            aria-label="auto"
            aria-live="polite"
          >
            <svg
              class="sun-and-moon"
              aria-hidden="true"
              width="24"
              height="24"
              viewBox="0 0 24 24"
            >
              <circle
                class="sun"
                cx="12"
                cy="12"
                r="6"
                mask="url(#moon-mask)"
                fill="currentColor"
              />
              <g class="sun-beams" stroke="currentColor">
                <line x1="12" y1="1" x2="12" y2="3" />
                <line x1="12" y1="21" x2="12" y2="23" />
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                <line x1="1" y1="12" x2="3" y2="12" />
                <line x1="21" y1="12" x2="23" y2="12" />
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
              </g>
              <mask class="moon" id="moon-mask">
                <rect x="0" y="0" width="100%" height="100%" fill="white" />
                <circle cx="24" cy="10" r="6" fill="black" />
              </mask>
            </svg>
          </button>
        </div>
      </nav>
    </header>
    <main class="place-page">
      <section id="place-details">
        <!-- Place details will be populated dynamically -->
      </section>
      <hr />
      <section id="reviews"></section>
      <hr />
      <section id="add-review" class="add-review">
        <h2>Add a Review</h2>
        <form id="review-form" class="form">
          <textarea id="review-text" name="review-text" placeholder="Write your review here..."></textarea>
          <div class="form-actions">
            <div class="rating-row">
              <label for="rating">Rating:</label>
              <select id="rating" name="rating" required>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
              </select>
            </div>
            <button type="submit" class="submit-button">Submit</button>
          </div>
        </form>
      </section>
    </main>
    <script src="scripts.js"></script>
    <footer>
      <p>© 2026 HBnB. All rights reserved.</p>
    </footer>
  </body>
</html>
